<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNI-COL News</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="database.js"></script>
    <style>
      BODY {       
        opacity: 0;
        transform: translateY(-50px);
        transition: opacity 0.3s ease-out, transform 0.3s ease-out;
      }
      body.loaded {
        opacity: 1;
        transform: translateY(0);
      }
      .btn {
        width: 800px;
      }
      .admin-only {
        display: none !important;
      }
      .admin-only.visible {
        display: flex !important;
      }
      .logout-btn {
        background: rgba(255, 100, 100, 0.9) !important;
        color: #fff !important;
        border: 1px solid rgba(0,0,0,.25);
        margin-left: 10px;
      }
      .logout-btn:hover {
        background: rgba(255, 80, 80, 1) !important;
      }
      .admin-actions {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .image-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100001;
        cursor: zoom-out;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease, background 0.3s ease;
      }

      .image-overlay.visible {
        opacity: 1;
        pointer-events: auto;
        background: rgba(0, 0, 0, 0.9);
      }

      .image-overlay img {
        max-width: 95vw;
        max-height: 95vh;
        object-fit: contain;
        border-radius: 8px;
        cursor: default;
        transform: scale(0.1);
        opacity: 0;
        transition: none;
      }

      .image-overlay.visible img {
        transform: scale(1);
        opacity: 1;
        transition: transform 0.5s cubic-bezier(0.34, 1.30, 0.20, 1), 
                    opacity 0.4s ease;
      }

      .image-overlay.closing {
        opacity: 0;
        pointer-events: none;
      }

      .image-overlay.closing img {
        transform: scale(0.1);
        opacity: 0;
        transition: transform 0.3s ease-in, opacity 0.2s ease;
      }

      .image-overlay-close {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: #fff;
        font-size: 24px;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transform: scale(0.5);
        transition: all 0.3s ease;
      }

      .image-overlay.visible .image-overlay-close {
        opacity: 1;
        transform: scale(1);
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s;
      }

      .image-overlay.closing .image-overlay-close {
        opacity: 0;
        transform: scale(0.5);
        transition: all 0.2s ease;
      }

      .image-overlay-close:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: scale(1.1);
      }

      .post-banner.clickable {
        cursor: zoom-in;
        transition: transform 0.2s ease;
      }

      .post-banner.clickable:hover {
        transform: scale(1.02);
      }

      /* Toast Notification Styles */
      .toast-container {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%) translateY(-100px);
        z-index: 100003;
        opacity: 0;
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        pointer-events: none;
      }

      .toast-container.visible {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      .toast {
        background: #4b5964;
        color: #fff;
        padding: 16px 28px;
        border-radius: 50px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        display: flex;
        align-items: center;
        gap: 14px;
        font-size: 15px;
        font-weight: 600;
        min-width: 220px;
        justify-content: center;
      }

      .toast-spinner {
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255,255,255,0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: toastSpin 0.8s linear infinite;
        flex-shrink: 0;
      }

      .toast.success {
        background: #51cf66;
      }

      .toast.success .toast-spinner {
        display: none;
      }

      .toast.success::before {
        content: "✓";
        font-size: 20px;
        font-weight: bold;
      }

      .toast.error {
        background: #ff6b6b;
      }

      .toast.error .toast-spinner {
        display: none;
      }

      .toast.error::before {
        content: "✕";
        font-size: 18px;
        font-weight: bold;
      }

      @keyframes toastSpin {
        to { transform: rotate(360deg); }
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }

      .toast.deleting .toast-text,
      .toast.publishing .toast-text {
        animation: pulse 1.5s ease-in-out infinite;
      }

      /* Banner logo - LEFT aligned for NEWS page */
      .banner-logo {
        height: 80px;
        width: auto;
        margin-right: 20px;
        flex-shrink: 0;
      }

      @media (max-width: 768px) {
        .banner-logo {
          height: 35px;
          margin-right: 10px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Toast Notification Container -->
    <div id="toastContainer" class="toast-container">
      <div id="toast" class="toast">
        <div class="toast-spinner"></div>
        <span class="toast-text" id="toastText">Loading...</span>
      </div>
    </div>

    <div class="banner-divider-top">
      <img src="unicols2.png" class="banner-logo" alt="UNI-COL News">
      <h1 id="collegeName"></h1>
      <div class="admin-actions">
        <button class="createpost-btn admin-only" id="createPostBtn" onclick="goCreate()">Create Post</button>
        <button class="createpost-btn logout-btn admin-only" id="logoutBtn" onclick="handleLogout()">Logout</button>
        <button class="createpost-btn" id="adminLoginBtn" onclick="goToLogin()">Admin Login</button>
      </div>
    </div>

    <div class="content">
      <div class="inner-content">

        <div class="news-toolbar">
          <label for="yearFilter" class="year-filter-label">Sort by Year</label>
          <select id="yearFilter">
            <option value="all">All</option>
          </select>
        </div>

        <div class="left-column">
          <div class="news-search">
            <label for="searchInput" class="search-label">Search</label>
            <input type="text" id="searchInput" placeholder="..." />
          </div>

          <div id="news-container"></div>

          <div id="pagination" class="pagination"></div>
        </div>

        <aside class="calendar-area">
          <div class="calendar-card">
            <div class="calendar-header">
              <h2>Academic Calendar</h2>
            </div>
            
            <div id="calendarRows" class="calendar-rows"></div>

            <button id="addCalendarRowBtn" class="calendar-add admin-only">+ Add Row</button>
          </div>
        </aside>

      </div>

    </div>

    <div class="banner-divider-bottom"></div>

    <!-- Post Modal -->
    <div id="postModal" class="post-modal hidden">
      <div class="post-modal-backdrop" onclick="closePostModal()"></div>
      <div class="post-modal-panel">
        <button class="post-modal-close" onclick="closePostModal()">X</button>
        <div id="postModalContent"></div>
      </div>
    </div>

    <!-- Full Image Overlay -->
    <div id="imageOverlay" class="image-overlay">
      <button class="image-overlay-close" onclick="closeImageOverlay()">×</button>
      <img id="fullImage" src="" alt="" onclick="event.stopPropagation()">
    </div>

    <div id="confirmModal" class="confirm-modal hidden">
      <div class="confirm-panel">
        <p id="confirmText" class="confirm-text"></p>
        <div class="confirm-buttons">
          <button id="confirmYes">Yes</button>
          <button id="confirmNo">No</button>
        </div>
      </div>
    </div>

    <script src="news.js"></script>
    <script src="functions.js"></script>
    <script>
      window.addEventListener('pageshow', (event) => {
        if (event.persisted) {
          const modal = document.getElementById('postModal');
          const content = document.getElementById('postModalContent');
          if (modal) {
            modal.classList.remove('show', 'closing');
            modal.classList.add('hidden');
            document.documentElement.classList.remove('modal-open');
            document.body.classList.remove('modal-open');
          }
          if (content) {
            content.innerHTML = '';
          }
        }
      });

      window.addEventListener('authStateChanged', (e) => {
        const { user, isAdmin } = e.detail;
        updateNewsUI(user, isAdmin);
      });

      async function initAuth() {
        await checkAuth();
      }

      function updateNewsUI(user, admin) {
        const createBtn = document.getElementById('createPostBtn');
        const loginBtn = document.getElementById('adminLoginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const addCalendarBtn = document.getElementById('addCalendarRowBtn');

        if (user && admin) {
          createBtn.classList.add('visible');
          logoutBtn.classList.add('visible');
          addCalendarBtn.classList.add('visible');
          loginBtn.classList.add('hidden');
        } else {
          createBtn.classList.remove('visible');
          logoutBtn.classList.remove('visible');
          addCalendarBtn.classList.remove('visible');
          loginBtn.classList.remove('hidden');
        }
      }

      async function handleLogout() {
        showToast('Logging out...', 'loading');
        try {
          await signOut();
          showToast('Logged out successfully!', 'success');
          setTimeout(() => {
            hideToast();
            window.location.reload();
          }, 1200);
        } catch (err) {
          showError('Error logging out');
        }
      }

      function goToLogin() {
        window.location.href = 'index.html';
      }

      function openImageOverlay(imageSrc) {
        const overlay = document.getElementById('imageOverlay');
        const fullImage = document.getElementById('fullImage');
        document.body.style.overflow = 'hidden';
        fullImage.src = imageSrc;
        overlay.classList.remove('closing');
        overlay.classList.add('visible');
      }

      function closeImageOverlay() {
        const overlay = document.getElementById('imageOverlay');
        const fullImage = document.getElementById('fullImage');
        overlay.classList.add('closing');
        overlay.classList.remove('visible');
        setTimeout(() => {
          overlay.classList.remove('closing');
          fullImage.src = '';
          document.body.style.overflow = '';
        }, 350);
      }

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          const overlay = document.getElementById('imageOverlay');
          if (overlay.classList.contains('visible')) {
            closeImageOverlay();
          }
          const postModal = document.getElementById('postModal');
          if (postModal.classList.contains('show')) {
            closePostModal();
          }
        }
      });

      document.getElementById('imageOverlay').addEventListener('click', function(e) {
        if (e.target === this) {
          closeImageOverlay();
        }
      });

      initAuth();
    </script>
  </body>
</html>
