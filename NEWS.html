<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNI-COL News</title>
    <link rel="stylesheet" href="style.css">

    <script src="database.js"></script>
    <style>
      BODY {       
        opacity: 0;
        transform: translateY(-50px);
        transition: opacity 0.3s ease-out, transform 0.9s cubic-bezier(0.22, 1, 0.36, 1);
      }
      body.loaded {
        opacity: 1;
        transform: translateY(0);
      }
      .btn {
        width: 800px;
      }

      .image-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100001;
        cursor: zoom-out;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease, background 0.3s ease;
      }

      .image-overlay.visible {
        opacity: 1;
        pointer-events: auto;
        background: rgba(0, 0, 0, 0.9);
      }

      .image-overlay img {
        max-width: 95vw;
        max-height: 95vh;
        object-fit: contain;
        border-radius: 8px;
        cursor: default;
        transform: scale(0.1);
        opacity: 0;
        transition: none;
      }

      .image-overlay.visible img {
        transform: scale(1);
        opacity: 1;
        transition: transform 0.5s cubic-bezier(0.34, 1.30, 0.20, 1), 
                    opacity 0.4s ease;
      }

      .image-overlay.closing {
        opacity: 0;
        pointer-events: none;
      }

      .image-overlay.closing img {
        transform: scale(0.1);
        opacity: 0;
        transition: transform 0.3s ease-in, opacity 0.2s ease;
      }

      .image-overlay-close {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: #fff;
        font-size: 24px;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transform: scale(0.5);
        transition: all 0.3s ease;
      }

      .image-overlay.visible .image-overlay-close {
        opacity: 1;
        transform: scale(1);
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s;
      }

      .image-overlay.closing .image-overlay-close {
        opacity: 0;
        transform: scale(0.5);
        transition: all 0.2s ease;
      }

      .image-overlay-close:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: scale(1.1);
      }

      .post-banner.clickable {
        cursor: zoom-in;
        transition: transform 0.2s ease;
      }

      .post-banner.clickable:hover {
        transform: scale(1.02);
      }

      /* Banner logo - LEFT aligned for NEWS page */
      .banner-logo {
        cursor: pointer;
        height: 80px;
        width: auto;
        margin-right: 20px;
        flex-shrink: 0;
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      @media (max-width: 768px) {
        .banner-logo {
          height: 50px;
          margin-bottom: 4px;
        }
      }

      /* Course filter - same styling as yearFilter */
      #courseFilter {
        width: 100%;
        max-width: 200px;
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid rgba(0,0,0,0.25);
        background: rgba(255,255,255,0.85);
        font-size: 16px;
        cursor: pointer;
        transition: background 0.2s ease, filter 0.2s ease;
      }

      #courseFilter:hover {
        background: rgba(220,220,220,0.95);
        filter: brightness(0.98);
      }

      #courseFilter:focus {
        outline: none;
      }
    </style>
  </head>
  <body>
    <!-- Toast Notification Container -->
    <div id="toastContainer" class="toast-container">
      <div id="toast" class="toast">
        <div class="toast-spinner"></div>
        <span class="toast-text" id="toastText">Loading...</span>
      </div>
    </div>
    
    <div class="banner-divider-top">
      <img src="unicols.png" class="banner-logo" alt="UNI-COL News">
      <h1 id="collegeName"></h1>
      <div class="admin-actions">
        <button class="createpost-btn admin-only" id="createPostBtn" onclick="goCreate()">Create Post</button>
        <button class="createpost-btn logout-btn admin-only" id="logoutBtn" onclick="handleLogout()">Logout</button>
        <button class="createpost-btn" id="adminLoginBtn" onclick="goToLogin()">Admin Login</button>
        <button class="createpost-btn admin-only" id="registerLoginBtn" onclick="goToLogin()">Register</button>
      </div>
    </div>

    <div class="content">
      <div class="inner-content">

        <div class="news-toolbar">
          <div class="filter-group">
            <label for="yearFilter" class="year-filter-label">Sort by Year</label>
            <div class="select-display" id="yearFilterDisplay">All</div>
              <select id="yearFilter" class="select-hidden">
                <option value="all">All</option>
              </select>
          </div>
          
          <div class="filter-group">
            <label for="courseFilter" class="year-filter-label">Sort by department</label>
            <div class="select-display" id="courseFilterDisplay">All</div>
  
            <!-- Real select (hidden but clickable) -->
            <select id="courseFilter" class="select-hidden">
              <option value="all">All</option>
            </select>
          </div>
        </div>

        <div class="left-column">
          <div class="news-search">
            <label for="searchInput" class="search-label">Search</label>
            <input type="text" id="searchInput" placeholder="..." />
          </div>

          <div id="news-container"></div>

          <div id="pagination" class="pagination"></div>
        </div>

        <aside class="calendar-area">
          <div class="calendar-card">
            <div class="calendar-header">
              <h2>Academic Calendar</h2>
            </div>
            
            <div id="calendarRows" class="calendar-rows"></div>

            <button id="addCalendarRowBtn" class="calendar-add admin-only">+ Add Row</button>
          </div>
        </aside>

      </div>

    </div>

    <div class="banner-divider-bottom"></div>

    <!-- Post Modal -->
    <div id="postModal" class="post-modal hidden">
      <div class="post-modal-backdrop" onclick="closePostModal()"></div>
      <div class="post-modal-panel">
        <button class="post-modal-close" onclick="closePostModal()">X</button>
        <div id="postModalContent"></div>
      </div>
    </div>

    <!-- Full Image Overlay -->
    <div id="imageOverlay" class="image-overlay">
      <button class="image-overlay-close" onclick="closeImageOverlay()">X</button>
      <img id="fullImage" src="" alt="" onclick="event.stopPropagation()">
    </div>

    <div id="confirmModal" class="confirm-modal hidden">
      <div class="confirm-panel">
        <p id="confirmText" class="confirm-text"></p>
        <div class="confirm-buttons">
          <button id="confirmYes">Yes</button>
          <button id="confirmNo">No</button>
        </div>
      </div>
    </div>

    <script>
      document.querySelector('.banner-logo').addEventListener('click', () => {
        window.location.href = 'menu.html';
      });
    </script>

    <script src="news.js"></script>
    <script src="functions.js"></script>
  </body>
</html>
