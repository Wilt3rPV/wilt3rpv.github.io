<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniCol News</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="database.js"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      html {
        min-height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        /* Allow scrolling */
        overflow-x: hidden;
        overflow-y: auto;
        background: #1a1a1a;
        
        opacity: 0;
        transform: translateY(-30px);
        transition: opacity 0.5s ease-out, transform 0.9s cubic-bezier(0.22, 1, 0.36, 1);
      }

      body.loaded {
        opacity: 1;
        transform: translateY(0);
      }

      /* =========================
         CAMPUS BACKGROUND SLIDE SHOW
         Scrolls with content - attached to content wrapper
         ========================= */
      
      /* Wrapper that contains both slideshow and content */
      .page-wrapper {
        position: relative;
        min-height: 100vh;
        width: 100%;
      }

      .campus-slideshow {
        position: absolute; /* CHANGED: was fixed, now absolute to scroll */
        top: 0;
        left: 0;
        width: 100%;
        height: 100%; /* Full height of wrapper */
        min-height: 100vh;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .campus-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: scroll; /* Scrolls with content */
        
        transform: translateX(100%);
        animation: campusSlide 40s infinite ease-in-out;
        will-change: transform;
        
        /* FADE EDGES */
        -webkit-mask-image: linear-gradient(
          to right,
          transparent 0%,
          black 2%,
          black 90%,
          transparent 100%
        );
        mask-image: linear-gradient(
          to right,
          transparent 0%,
          black 2%,
          black 98%,
          transparent 100%
        );
      }

      /* Individual campus backgrounds */
      .campus-bg-1 {
        background-image: url("prmsu.png");
        animation-delay: 0s;
      }

      .campus-bg-2 {
        background-image: url("scfront2.png");
        animation-delay: 8s;
      }

      .campus-bg-3 {
        background-image: url("colom.png");
        animation-delay: 16s;
      }

      .campus-bg-4 {
        background-image: url("botolans.png");
        animation-delay: 24s;
      }

      .campus-bg-5 {
        background-image: url("prmsumas.png");
        animation-delay: 32s;
      }

      @keyframes campusSlide {
        0% {
          transform: translateX(100%);
          z-index: 2;
        }
        
        15% {
          transform: translateX(0%);
          z-index: 2;
        }
        
        25% {
          transform: translateX(0%);
          z-index: 1;
        }
        
        40% {
          transform: translateX(-100%);
          z-index: 0;
        }
        
        40.01%, 100% {
          transform: translateX(-100%);
          z-index: 0;
        }
      }

      /* Dark overlay for readability - covers full scrollable area */
      .campus-slideshow::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.4);
        z-index: 10;
      }

      /* Content container - scrolls OVER the slideshow */
      .content {
        position: relative;
        z-index: 1;
        width: min(1600px, 100%);
        margin: 0 auto;
        background: var(--surface);
        box-shadow: 0 0 15px rgba(0,0,0,.3);
        min-height: 100vh;
      }

      .inner-content {
        text-align: center;
        padding: 0 var(--gutter) 40px var(--gutter);
      }

      /* =========================
         REDESIGNED CAMPUS BUTTONS
         ========================= */
      
      .college-container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 40px 20px;
        display: grid;
        grid-template-columns: repeat(2, minmax(400px, 1fr));
        gap: 32px;
        justify-content: center;
      }

      .btn {
        width: 100%;
        height: 220px;
        border: none;
        border-radius: 16px;
        cursor: pointer;
        overflow: hidden;
        position: relative;
        background-size: 120%;
        background-position: center;
        background-repeat: no-repeat;
        color: #fff;
        font-size: clamp(20px, 2vw, 28px);
        font-weight: 800;
        text-shadow: 3px 3px 6px #000;
        box-shadow: 
          inset 0 0 150px rgba(0,0,0,.5),
          0 10px 30px rgba(0,0,0,0.3);
        transition: transform 0.35s ease, box-shadow 0.2s ease, filter 0.2s ease, background-size 0.6s ease;
      }

      .btn span {
        position: relative;
        z-index: 2;
        display: block;
        padding: 20px;
      }

      .btn:hover {
        transform: translateY(-8px) scale(1.02);
        box-shadow: 
          inset 0 0 150px rgba(0,0,0,.5),
          0 20px 40px rgba(0,0,0,0.4);
        filter: brightness(1.1);
        background-size: 110%;
      }

      .btn:active {
        transform: translateY(-2px) scale(0.98);
        box-shadow: 
          inset 0 0 150px rgba(0,0,0,.6),
          0 10px 20px rgba(0,0,0,0.3);
        filter: brightness(0.98);
      }

      .btn1 { background-image: url("scfront2.png"); }
      .btn2 { background-image: url("prmsu.png"); }
      .btn3 { background-image: url("colom.png"); }
      .btn4 { background-image: url("prmsumas.png"); }
      .btn5 { background-image: url("colom2.png"); }
      .btn6 { background-image: url("lie.png"); }
      .btn7 { background-image: url("botolans.png"); }
      .btn8 { background-image: url("prmsucaste.png"); }
      .btn9 { background-image: url("prmsucruz.png"); }
      .btn10 { background-image: url("gcgapo.png"); }

      .banner-logo {
        cursor: pointer;
        height: 80px;
        width: auto;
        margin-right: 20px;
        flex-shrink: 0;
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        /* filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); */
      }

      @media (max-width: 900px) {
        .college-container {
          grid-template-columns: 1fr;
          max-width: 600px;
          gap: 24px;
          padding: 24px 16px;
        }
      }

      @media (max-width: 520px) {
        .banner-logo {
          height: 60px;
        }
      }
    </style>
  </head>
  <body class="college-picker">
    <!-- Page wrapper contains both slideshow and content -->
    <div class="page-wrapper">
      
      <!-- Campus Background Slide Show - scrolls with content -->
      <div class="campus-slideshow">
        <div class="campus-bg campus-bg-1"></div>
        <div class="campus-bg campus-bg-2"></div>
        <div class="campus-bg campus-bg-3"></div>
        <div class="campus-bg campus-bg-4"></div>
        <div class="campus-bg campus-bg-5"></div>
      </div>

      <div class="banner-divider-top">
        <img src="unicols.png" class="banner-logo" alt="UNI-COL News">
        <h1>Select a campus</h1>
      </div>

      <!-- Content scrolls over the slideshow -->
      <div class="content">
        <div class="inner-content">
          <br>
          <br>

          <div class="college-container">
            <button class="btn btn2" onclick="window.location.href='NEWS.html?college=prmsuIba'"><span>President Ramon Magsaysay<br>State University - Iba Campus</span></button>

            <button class="btn btn1" onclick="window.location.href='NEWS.html?college=macsatIba'"><span>Mirco Asia College of Science<br>And Technology - Iba Campus</span></button>

            <button class="btn btn7" onclick="window.location.href='NEWS.html?college=prmsuBotolan'"><span>President Ramon Magsaysay<br>State University - Botolan Campus</span></button>

            <button class="btn btn3" onclick="window.location.href='NEWS.html?college=ccGapo'"><span>Columban College<br>- Olongapo Campus</span></button>

            <button class="btn btn4" onclick="window.location.href='NEWS.html?college=prmsuMan'"><span>President Ramon Magsaysay<br>State University - Masinloc Campus</span></button>

            <button class="btn btn9" onclick="window.location.href='NEWS.html?college=prmsuCruz'"><span>President Ramon Magsaysay<br>State University - Sta. Cruz Campus</span></button>

            <button class="btn btn8" onclick="window.location.href='NEWS.html?college=prmsuCaste'"><span>President Ramon Magsaysay<br>State University - Castillejos Campus</span></button>

            <button class="btn btn5" onclick="window.location.href='NEWS.html?college=ccCruz'"><span>Columban College<br>- Sta. Cruz Campus</span></button>

            <button class="btn btn10" onclick="window.location.href='NEWS.html?college=gcGapo'"><span>Gordon College<br>- Olongapo Campus</span></button>

            <button class="btn btn6" onclick="window.location.href='NEWS.html?college=lyceumBotolan'"><span>Lyceum Of Western Luzon<br>- Botolan Campus</span></button>
          </div>

        </div>
       
        
      </div>
    </div>

    <div class="banner-divider-bottom"></div>

    <script>
      document.querySelector('.banner-logo').addEventListener('click', () => {
        window.location.href = 'index.html';
      });
    </script>
    <script src="news.js"></script>
    <script src="functions.js"></script>
  </body>
</html>
