<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNI-COL News</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="database.js"></script>
    <style>
      .inner-content {
        text-align: center;
      }

      body {
        opacity: 0;
        transform: translateY(-50px);
        transition: opacity 0.3s ease-out, transform 0.9s cubic-bezier(0.22, 1, 0.36, 1);
      }

      body.loaded {
        opacity: 1;
        transform: translateY(0);
      }

      .btn1 {
        background-image: url("scfront2.png");
        background-size: cover;
      }

      .btn2 {
        background-image: url("prmsu.png");
      }

      .btn3 {
        background-image: url("colom.png");
      }

      .btn4 {
        background-image: url("prmsumas.png");
      }

      .btn5 {
        background-image: url("colom2.png");
      }

      .btn6 {
        background-image: url("lie.png");
      }

      .btn7 {
        background-image: url("botolans.png");
      }

      /* Banner logo - LEFT aligned for MENU page */
      .banner-logo {
        height: 80px;
        width: auto;
        margin-right: 20px;
        flex-shrink: 0;
      }

      @media (max-width: 768px) {
        .banner-logo {
          height: 50px;
          margin-right: 10px;
        }
      }
    </style>
  </head>
  <body class="college-picker">
    <div class="banner-divider-top">
      <img src="unicols2.png" class="banner-logo" alt="UNI-COL News">
      <h1>Select a campus</h1>
      <div class="admin-actions">
        <button class="createpost-btn" id="adminLoginBtn" onclick="goToLogin()">Admin Login</button>
      </div>
    </div>
    
    <div class="content">
      <div class="inner-content">
        <br>
        <br>

        <div class="college-container">
          <button class="btn btn2" onclick="window.location.href='NEWS.html?college=prmsuIba'"><span>President Ramon Magsaysay<br>State University - Iba Campus</span></button>

          <button class="btn btn1" onclick="window.location.href='NEWS.html?college=macsatIba'"><span>Mirco Asia College of Science<br>And Technology - Iba Campus</span></button>

          <button class="btn btn7" onclick="window.location.href='NEWS.html?college=prmsuBotolan'"><span>President Ramon Magsaysay<br>State University - Botolan Campus</span></button>

          <button class="btn btn3" onclick="window.location.href='NEWS.html?college=ccGapo'"><span>Columban College<br>- Olongapo Campus</span></button>

          <button class="btn btn4" onclick="window.location.href='NEWS.html?college=prmsuMan'"><span>President Ramon Magsaysay<br>State University - Masinloc Campus</span></button>

          <button class="btn" onclick="window.location.href='NEWS.html?college=prmsuCruz'"><span>President Ramon Magsaysay<br>State University - Sta. Cruz Campus</span></button>

          <button class="btn " onclick="window.location.href='NEWS.html?college=prmsuCaste'"><span>President Ramon Magsaysay<br>State University - Castillejos Campus</span></button>

          <button class="btn btn5" onclick="window.location.href='NEWS.html?college=ccCruz'"><span>Columban College<br>- Sta. Cruz Campus</span></button>

          <button class="btn " onclick="window.location.href='NEWS.html?college=gcGapo'"><span>Gordon College<br>- Olongapo Campus</span></button>

          <button class="btn btn6" onclick="window.location.href='NEWS.html?college=lyceumBotolan'"><span>Lyceum Of Western Luzon<br>- Botolan Campus</span></button>
        </div>

      </div>
     
    </div>
    <div class="banner-divider-bottom"></div>
    <script src="news.js"></script>
    <script src="functions.js"></script>
  </body>
</html>
