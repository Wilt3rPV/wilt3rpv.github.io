<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create a post</title>
    <link rel="stylesheet" href="createpost.css">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="database.js"></script>
    <style>
      /* Image upload styles */
      .image-upload-btn {
        position: relative;
        overflow: hidden;
      }
      
      .image-upload-btn input[type="file"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
      }

      /* Content image in editor - LIMITED SIZE */
      .editor img {
        max-width: 500px !important;
        max-height: 500px !important;
        width: auto;
        height: auto;
        object-fit: contain;
        border-radius: 8px;
        margin: 10px 0;
        cursor: pointer;
        display: block;
      }

      /* Image hover effect in editor */
      .editor img:hover {
        box-shadow: 0 0 0 3px rgba(124, 132, 140, 0.5);
      }

      /* Selected image in editor */
      .editor img.selected {
        box-shadow: 0 0 0 3px #7c848c;
      }

      /* Image preview modal - FULL SIZE */
      .image-preview-modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.9);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 100002;
        cursor: zoom-out;
      }

      .image-preview-modal.visible {
        display: flex;
      }

      .image-preview-modal img {
        max-width: 95vw;
        max-height: 95vh;
        object-fit: contain;
        border-radius: 8px;
        transform: scale(0.1);
        opacity: 0;
        transition: none;
      }

      .image-preview-modal.visible img {
        transform: scale(1);
        opacity: 1;
        transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), 
                    opacity 0.4s ease;
      }

      .image-preview-close {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: #fff;
        font-size: 24px;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transform: scale(0.5);
        transition: all 0.3s ease;
      }

      .image-preview-modal.visible .image-preview-close {
        opacity: 1;
        transform: scale(1);
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s;
      }

      .image-preview-close:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: scale(1.1);
      }

      .editor-toolbar {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
        flex-wrap: wrap;
      }

      .editor-toolbar button {
        padding: 8px 12px;
        cursor: pointer;
        position: relative;
      }

      .editor-toolbar button.active {
        background: #c5c3c6;
      }

      /* Toast Notification Styles - Glass */
      .toast-container {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%) translateY(-100px);
        z-index: 100003;
        opacity: 0;
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        pointer-events: none;
      }

      .toast-container.visible {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      .toast {
        /* Glass effect */
        background: color-mix(in srgb, #4b5964 80%, transparent);
        backdrop-filter: blur(20px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.4);
        
        color: #fff;
        padding: 16px 28px;
        border-radius: 50px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        display: flex;
        align-items: center;
        gap: 14px;
        font-size: 15px;
        font-weight: 600;
        min-width: 220px;
        justify-content: center;
      }

      .toast-spinner {
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255,255,255,0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: toastSpin 0.8s linear infinite;
        flex-shrink: 0;
      }

      .toast.success {
        background: color-mix(in srgb, #51cf66 80%, transparent);
      }

      .toast.success .toast-spinner {
        display: none;
      }

      .toast.success::before {
        content: "✓";
        font-size: 20px;
        font-weight: bold;
      }

      .toast.error {
        background: color-mix(in srgb, #ff6b6b 80%, transparent);
      }

      .toast.error .toast-spinner {
        display: none;
      }

      .toast.error::before {
        content: "✕";
        font-size: 18px;
        font-weight: bold;
      }

      @keyframes toastSpin {
        to { transform: rotate(360deg); }
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }

      .toast.loading .toast-text {
        animation: pulse 1.5s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <!-- Toast Notification Container -->
    <div id="toastContainer" class="toast-container">
      <div id="toast" class="toast">
        <div class="toast-spinner"></div>
        <span class="toast-text" id="toastText">Publishing post...</span>
      </div>
    </div>

    <div class="content">
      <div class="banner-divider-top">
        <br>
        <h1>Create a Post</h1>
      </div>
      <div class="inner-content">
        
        <div class="post-form">

          <label>Post Title</label>
          <input type="text" id="title" placeholder="Enter Headline">

          <label>Post Content</label>
          <div class="editor-toolbar">
            <button type="button" id="boldBtn" onclick="formatText('bold')"><b>B</b></button>
            <button type="button" id="italicBtn" onclick="formatText('italic')"><i>I</i></button>
            <button type="button" id="underlineBtn" onclick="formatText('underline')"><u>U</u></button>
            <button type="button" onclick="addLink()">Link</button>
            <button type="button" class="image-upload-btn" title="Insert Image">
              📷 Image
              <input type="file" accept="image/*" onchange="insertImage(this)">
            </button>
            <button type="button" onclick="deleteSelectedImage()" id="deleteImgBtn" style="display:none; background:#ff6b6b; color:white;">🗑️ Delete</button>
          </div>

          <div id="editor" class="editor" contenteditable="true" data-placeholder="Write the news content here"></div>

          <label>Banner Image</label>
          <img id="bannerPreview" style="max-width:100%; display:none;">
          <input type="file" id="banner" accept="image/*">

          <label>College</label>
          <select id="collegeSelect">
            <option value="prmsuIba">PRMSU IBA</option>
            <option value="prmsuBotolan">PRMSU BOTOLAN</option>
            <option value="macsatIba">MACSAT IBA</option>
            <option value="ccGapo">CC OLONGAPO</option>
            <option value="prmsuMan">PRMSU MASINLOC</option>
            <option value="ccCruz">CC STA CRUZ</option>
            <option value="lyceumBotolan">LYCEUM BOTOLAN</option>
          </select>

          <label>Department/Course</label>
          <select id="courseSelect">
            <option value="">NONE</option>
          </select>

          <button onclick="createPost()">Publish</button>

        </div>

      </div>
      <div class="banner-divider-bottom"></div>
    </div>

    <!-- Image Preview Modal -->
    <div id="imagePreviewModal" class="image-preview-modal" onclick="closeImagePreview()">
      <button class="image-preview-close" onclick="closeImagePreview()">×</button>
      <img id="previewModalImg" src="" alt="" onclick="event.stopPropagation()">
    </div>

    <div id="confirmModal" class="confirm-modal hidden">
      <div class="confirm-panel">

        <p id="confirmText" class="confirm-text">
        </p>

        <div class="confirm-buttons">
          <button id="confirmYes">OK</button>
          <button id="confirmNo">Cancel</button>
        </div>

      </div>
    </div>

    <script src="createpost.js"></script>
    <script src="news.js"></script>
  </body>
</html>
