<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNI-COL News</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="database.js"></script>
    <style>
      BODY {       
        opacity: 0;
        transform: translateX(20px);
        transition: opacity 0.3s ease, transform 0.3s ease;
      }
      body.loaded {
        opacity: 1;
        transform: translateX(0);
      }
      .btn {
        width: 800px;
      }
      .admin-only { display: none; }
      .admin-only.visible { display: inline-block; }

      /* Post Loading Spinner */
      .post-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 300px;
        gap: 14px;
      }

      .post-spinner {
        width: 42px;
        height: 42px;
        border: 4px solid rgba(0,0,0,0.15);
        border-top: 4px solid rgba(0,0,0,0.65);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      .post-loading-text {
        font-size: 16px;
        color: rgba(0,0,0,0.7);
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* Fixed banner image scaling */
      .post-banner {
        width: 100%;
        height: clamp(220px, 50vw, 400px);
        object-fit: cover;
        object-position: center;
        border-radius: 12px;
        margin: 0 auto 18px auto;
        display: block;
        cursor: zoom-in;
        transition: transform 0.2s ease;
      }

      .post-banner:hover {
        transform: scale(1.02);
      }

      /* Content images - proper scaling */
      #post img:not(.post-banner) {
        max-width: 100%;
        height: auto;
        object-fit: contain;
        border-radius: 8px;
        margin: 10px 0;
        display: block;
      }

      /* Full Image Overlay */
      .image-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100001;
        cursor: zoom-out;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease, background 0.3s ease;
      }

      .image-overlay.visible {
        opacity: 1;
        pointer-events: auto;
        background: rgba(0, 0, 0, 0.9);
      }

      .image-overlay img {
        max-width: 95vw;
        max-height: 95vh;
        object-fit: contain;
        border-radius: 8px;
        cursor: default;
        transform: scale(0.1);
        opacity: 0;
        transition: none;
      }

      .image-overlay.visible img {
        transform: scale(1);
        opacity: 1;
        transition: transform 0.5s cubic-bezier(0.34, 1.30, 0.20, 1), 
                    opacity 0.4s ease;
      }

      .image-overlay.closing {
        opacity: 0;
        pointer-events: none;
      }

      .image-overlay.closing img {
        transform: scale(0.1);
        opacity: 0;
        transition: transform 0.3s ease-in, opacity 0.2s ease;
      }

      .image-overlay-close {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: #fff;
        font-size: 24px;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transform: scale(0.5);
        transition: all 0.3s ease;
      }

      .image-overlay.visible .image-overlay-close {
        opacity: 1;
        transform: scale(1);
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s;
      }

      .image-overlay.closing .image-overlay-close {
        opacity: 0;
        transform: scale(0.5);
        transition: all 0.2s ease;
      }

      .image-overlay-close:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: scale(1.1);
      }

      /* Post content styling */
      #post {
        width: min(980px, 100%);
        margin: 40px auto;
        padding: 0 20px 40px 20px;
      }

      #post h2 {
        margin: 0 0 8px 0;
        font-size: clamp(24px, 5vw, 36px);
      }

      .post-date {
        display: block;
        font-size: 16px;
        margin: 0 0 16px 0;
        color: rgba(0,0,0,0.65);
      }

      #post p {
        font-size: 18px;
        line-height: 1.7;
        margin-bottom: 16px;
      }

      #post button {
        margin-top: 14px;
        margin-right: 10px;
        padding: 12px 20px;
        border-radius: 10px;
        border: 1px solid rgba(0,0,0,0.25);
        background: rgba(255,255,255,0.8);
        font-size: 16px;
        transition: transform 0.15s ease, box-shadow 150ms ease, filter 160ms ease;
        cursor: pointer;
      }

      #post button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 14px rgba(0,0,0,0.15);
        filter: brightness(1.05);
        background: #fff;
      }

      #post button:active {
        transform: translateY(0);
        box-shadow: 0 3px 8px rgba(0,0,0,0.12);
        filter: brightness(0.98);
      }

            /* Mobile adjustments */
      @media (max-width: 768px) {
        #post {
          margin: 20px auto;
          padding: 0 16px 30px 16px;
        }

        .post-banner {
          height: 200px;
          border-radius: 8px;
        }

        /* BIGGER TEXT FOR MOBILE */
        #post h2 {
          font-size: 26px; /* Was 22px */
          line-height: 1.3;
        }

        .post-content {
          font-size: 18px; /* Was 16px */
          line-height: 1.8; /* More breathing room */
        }

        .post-content p {
          margin-bottom: 20px; /* More space between paragraphs */
        }

        .content-img {
          max-height: 250px;
        }

        .post-date {
          font-size: 14px; /* Slightly bigger too */
        }

        #post button {
          width: 100%;
          margin-right: 0;
          padding: 14px; /* Bigger touch target */
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Full Image Overlay -->
    <div id="imageOverlay" class="image-overlay" onclick="closeImageOverlay()">
      <button class="image-overlay-close" onclick="closeImageOverlay()">X</button>
      <img id="fullImage" src="" alt="" onclick="event.stopPropagation()">
    </div>

    <div class="content">
      <div class="banner-divider-top"></div>
      <div class="inner-content">
        <div id="post">
          <!-- Loading state will be shown here initially -->
          <div class="post-loading" id="postLoading">
            <div class="post-spinner"></div>
            <div class="post-loading-text">Loading post...</div>
          </div>
        </div>
      </div>
      <div class="banner-divider-bottom"></div>
    </div>

    <script src="post.js"></script>
    <script src="functions.js"></script>
    <script>
      window.addEventListener('authStateChanged', (e) => {
        const { user, isAdmin } = e.detail;
        if (typeof updatePostUI === 'function') {
          updatePostUI(user, isAdmin);
        }
      });
      checkAuth();
    </script>
  </body>
</html>
