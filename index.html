<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="database.js"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #cfcfcf;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      padding: 16px;
      overflow: hidden;
      position: relative;
    }

    .bg-image,
    .bg-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .bg-image {
      background-image: url("barf.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transform: scale(1.08);
      z-index: 0;
      animation: bgDarkenImage 0.5s ease forwards;
    }

    .bg-overlay {
      background: rgba(0, 0, 0, 0.35);
      z-index: 1;
    }

    .card {
      position: relative;
      z-index: 2;
      width: min(560px, 100%);
      min-height: min(630px, 92vh);
      background: #4b5964;
      border-radius: 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      padding: 28px 20px;
      text-align: center;
      overflow: hidden;
      animation: cardIn 0.7s ease-out forwards;
      animation-delay: 0.45s;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .card.auth-mode {
      gap: 16px;
      padding: 32px 28px;
    }

    .main-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      width: 100%;
      transition: all 0.3s ease;
    }

    .main-content.hidden {
      opacity: 0;
      transform: translateY(-20px);
      pointer-events: none;
      position: absolute;
    }

    .card.auth-mode .main-content {
      display: none;
    }

    .auth-content {
      display: none;
      flex-direction: column;
      width: 100%;
      max-width: 360px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .card.auth-mode .auth-content {
      display: flex;
      opacity: 1;
      transform: translateY(0);
    }

    .logo-img {
      width: min(400px, 100%);
      height: auto;
      display: block;
      opacity: 0;
      animation: logoSequence 2.0s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: 0.75s;
      transition: all 0.3s ease;
    }

    .subtitle {
      margin: 0;
      color: #fff;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.2px;
      opacity: 0;
      animation: textIn 2.0s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: 1.9s;
      transition: all 0.3s ease;
    }

    .btn-wrap {
      opacity: 0;
      animation: buttonIn 0.45s ease forwards;
      animation-delay: 1.99s;
      transition: all 0.3s ease;
    }

    .btn {
      border: 0;
      cursor: pointer;
      padding: 20px 64px;
      border-radius: 999px;
      background: #7c848c;
      color: #fff;
      font-size: 16px;
      font-weight: 650;
      transition: transform 150ms ease, box-shadow 150ms ease, filter 150ms ease;
      max-width: 100%;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(0,0,0,0.22);
      filter: brightness(1.05);
    }

    .btn:active {
      transform: translateY(0);
      box-shadow: 0 6px 14px rgba(0,0,0,0.18);
      filter: brightness(0.98);
    }

    .admin-login-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 10px 20px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.3);
      background: transparent;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s ease;
      opacity: 0;
      animation: buttonIn 0.45s ease forwards;
      animation-delay: 2.2s;
    }

    .admin-login-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.6);
    }

    .card.auth-mode .admin-login-btn {
      display: none;
    }

    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 10px 20px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.3);
      background: transparent;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: none;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.6);
    }

    .card.auth-mode .back-btn {
      display: block;
    }

    /* Centered at top */
    .admin-badge {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 16px;
      border-radius: 999px;
      background: #51cf66;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      opacity: 0;
      animation: buttonIn 0.45s ease forwards;
      animation-delay: 2.2s;
      display: none;
    }

    .admin-badge.visible {
      display: block;
    }

    .auth-header {
      color: #fff;
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 8px 0;
    }

    .auth-subtitle {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 16px;
      text-align: left;
    }

    .form-label {
      display: block;
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 16px;
      outline: none;
      transition: all 0.15s ease;
    }

    .form-input:focus {
      border-color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.15);
    }

    .form-input::placeholder {
      color: rgba(255,255,255,0.4);
    }

    .form-button {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      background: #7c848c;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.15s ease;
    }

    .form-button:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    .form-error {
      color: #ff6b6b;
      font-size: 14px;
      margin-top: 12px;
      text-align: center;
    }

    .form-success {
      color: #51cf66;
      font-size: 14px;
      margin-top: 12px;
      text-align: center;
      padding: 12px;
      background: rgba(81, 207, 102, 0.1);
      border-radius: 8px;
      border: 1px solid rgba(81, 207, 102, 0.3);
    }

    .registered-email {
      font-weight: 600;
      color: #fff;
      display: block;
      margin-top: 4px;
    }

    .form-toggle {
      text-align: center;
      margin-top: 20px;
      color: rgba(255,255,255,0.6);
      font-size: 14px;
    }

    .form-toggle a {
      color: #fff;
      cursor: pointer;
      text-decoration: underline;
      font-weight: 500;
    }

    .logged-in-view {
      text-align: center;
      color: #fff;
    }

    .logged-in-email {
      font-weight: 600;
      color: #7c848c;
    }

    .logout-btn {
      margin-top: 20px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.3);
    }

    .logout-btn:hover {
      background: rgba(255,255,255,0.2);
    }

    .hidden { display: none !important; }

    @keyframes textIn {
      from { opacity: 0; transform: translateY(-45px); }
      to { opacity: 1; transform: translateY(-70px); }
    }

    @keyframes buttonIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes cardIn {
      0% { opacity: 0; transform: scale(0.95); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes logoSequence {
      0% { opacity: 0; transform: translateY(0px) scale(0.9); }
      45% { opacity: 1; transform: translateY(0px) scale(1); }
      100% { opacity: 1; transform: translateY(-50px) scale(1); }
    }

    @keyframes bgDarkenImage {
      from { filter: brightness(1); }
      to { filter: brightness(0.8); }
    }

    .card-exit {
      animation: cardOut 0.4s ease-in forwards !important;
    }

    @keyframes cardOut {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.95); }
    }

    @media (max-width: 420px) {
      .card { border-radius: 22px; }
      .card.auth-mode { padding: 24px 20px; }
      .btn { width: 100%; padding: 32px 48px; font-size: 20px; }
      .auth-header { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="bg-image"></div>
  <div class="bg-overlay"></div>

  <div class="card" id="card">
    <div class="admin-badge" id="adminBadge">ADMIN</div>
    
    <button class="back-btn" id="backBtn" onclick="showMainContent()">← Back</button>
    <button class="admin-login-btn" id="adminLoginBtn" onclick="showAuthMode()">Admin Login</button>

    <div class="main-content" id="mainContent">
      <img src="final.png" class="logo-img" id="logoImg">
      <div class="text-wrap" id="textWrap">
        <p class="subtitle">The news you need is just a click away~</p>
      </div>
      <div class="btn-wrap" id="btnWrap">
        <button class="btn" id="continueBtn">Continue &gt;</button>
      </div>
    </div>

    <div class="auth-content" id="authContent">
      
      <div id="loginView">
        <h2 class="auth-header">Welcome Back</h2>
        <p class="auth-subtitle">Sign in to manage content</p>
        
        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="loginEmail" placeholder="admin@example.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" required>
          </div>
          <button type="submit" class="form-button">Sign In</button>
          <div class="form-error hidden" id="loginError"></div>
        </form>

        <div class="form-toggle">
          Need to register an admin? <a onclick="showRegisterView()">Register</a>
        </div>
      </div>

      <div id="registerView" class="hidden">
        <h2 class="auth-header">New Admin</h2>
        <p class="auth-subtitle">Create an admin account</p>
        
        <form onsubmit="handleRegister(event)">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="registerEmail" placeholder="newadmin@example.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" id="registerPassword" placeholder="••••••••" required minlength="6">
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-input" id="registerConfirm" placeholder="••••••••" required>
          </div>
          <button type="submit" class="form-button">Create Account</button>
          <div class="form-error hidden" id="registerError"></div>
          <div class="form-success hidden" id="registerSuccess">
            Admin created successfully!
            <span class="registered-email" id="registeredEmail"></span>
            They can now log in.
          </div>
        </form>

        <div class="form-toggle">
          Already have an account? <a onclick="showLoginView()">Sign In</a>
        </div>
      </div>

      <div id="loggedInView" class="hidden logged-in-view">
        <h2 class="auth-header">Admin Access</h2>
        <p class="auth-subtitle">Logged in as <span class="logged-in-email" id="loggedInEmail"></span></p>
        
        <button class="form-button logout-btn" onclick="handleLogout()">Logout</button>
        
        <div style="margin-top: 24px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.2);">
          <p class="auth-subtitle" style="margin-bottom: 16px;">Need to add another admin?</p>
          <button class="form-button" onclick="showRegisterFromLoggedIn()">Register New Admin</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    const bg = document.querySelector('.bg-image');
    function animateBackground() {
      const x = Math.random() * 220 - 100;
      const y = Math.random() * 220 - 100;
      const scale = 2.0 + Math.random() * 0.3;
      bg.style.transition = 'transform 3s ease-in-out';
      bg.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
    }
    animateBackground();
    setInterval(animateBackground, 3000);

    document.getElementById('continueBtn').addEventListener('click', () => {
      document.getElementById('card').classList.add('card-exit');
      setTimeout(() => {
        window.location.href = 'menu.html';
      }, 400);
    });

    // FIXED: Reset auth-content styles when showing auth mode
    function showAuthMode() {
      const card = document.getElementById('card');
      const mainContent = document.getElementById('mainContent');
      const authContent = document.getElementById('authContent');
      
      // Reset auth-content styles before showing
      authContent.style.opacity = '';
      authContent.style.transform = '';
      
      mainContent.style.opacity = '0';
      mainContent.style.transform = 'translateY(-20px)';
      
      setTimeout(() => {
        card.classList.add('auth-mode');
        updateAuthView();
      }, 300);
    }

    // FIXED: Reset main-content styles when going back
    function showMainContent() {
      const card = document.getElementById('card');
      const mainContent = document.getElementById('mainContent');
      const authContent = document.getElementById('authContent');
      
      // Reset main-content styles before showing
      mainContent.style.opacity = '';
      mainContent.style.transform = '';
      
      authContent.style.opacity = '0';
      authContent.style.transform = 'translateY(20px)';
      
      card.classList.remove('auth-mode');
      
      setTimeout(() => {
        mainContent.style.opacity = '1';
        mainContent.style.transform = 'translateY(0)';
      }, 100);
    }

    function showLoginView() {
      document.getElementById('loginView').classList.remove('hidden');
      document.getElementById('registerView').classList.add('hidden');
      document.getElementById('loggedInView').classList.add('hidden');
      clearErrors();
    }

    function showRegisterView() {
      document.getElementById('loginView').classList.add('hidden');
      document.getElementById('registerView').classList.remove('hidden');
      document.getElementById('loggedInView').classList.add('hidden');
      clearErrors();
    }

    function showLoggedInView() {
      document.getElementById('loginView').classList.add('hidden');
      document.getElementById('registerView').classList.add('hidden');
      document.getElementById('loggedInView').classList.remove('hidden');
      document.getElementById('loggedInEmail').textContent = currentUser?.email || '';
    }

    function showRegisterFromLoggedIn() {
      showRegisterView();
    }

    function updateAuthView() {
      if (currentUser && isAdmin) {
        showLoggedInView();
      } else {
        showLoginView();
      }
    }

    function clearErrors() {
      document.getElementById('loginError').classList.add('hidden');
      document.getElementById('registerError').classList.add('hidden');
      document.getElementById('registerSuccess').classList.add('hidden');
    }

    function updateUI() {
      const loginBtn = document.getElementById('adminLoginBtn');
      const badge = document.getElementById('adminBadge');
      
      if (currentUser && isAdmin) {
        loginBtn.classList.add('hidden');
        badge.classList.add('visible');
      } else {
        loginBtn.classList.remove('hidden');
        badge.classList.remove('visible');
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const errorDiv = document.getElementById('loginError');
      errorDiv.classList.add('hidden');

      try {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        
        console.log('Attempting login with:', email);
        
        const result = await signIn(email, password);
        console.log('Sign in result:', result);
        
        updateUI();
        updateAuthView();
      } catch (err) {
        console.error('Login error details:', err);
        errorDiv.textContent = err.message || 'Unknown error occurred';
        errorDiv.classList.remove('hidden');
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const errorDiv = document.getElementById('registerError');
      const successDiv = document.getElementById('registerSuccess');
      const emailSpan = document.getElementById('registeredEmail');
      errorDiv.classList.add('hidden');
      successDiv.classList.add('hidden');

      const email = document.getElementById('registerEmail').value;
      const password = document.getElementById('registerPassword').value;
      const confirm = document.getElementById('registerConfirm').value;

      if (password !== confirm) {
        errorDiv.textContent = 'Passwords do not match';
        errorDiv.classList.remove('hidden');
        return;
      }

      try {
        await signUp(email, password);
        
        emailSpan.textContent = email;
        successDiv.classList.remove('hidden');
        document.getElementById('registerView').querySelector('form').reset();
      } catch (err) {
        errorDiv.textContent = err.message;
        errorDiv.classList.remove('hidden');
      }
    }

    async function handleLogout() {
      await signOut();
      showLoginView();
      updateUI();
    }

    window.addEventListener('authStateChanged', () => {
      updateUI();
      if (document.getElementById('card').classList.contains('auth-mode')) {
        updateAuthView();
      }
    });

    checkAuth().then(() => {
      updateUI();
    });
  </script>
</body>
</html>
